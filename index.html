    <link rel="preconnect" href="https://fonts.googleapis.com" />

    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSG - Online Study Group</title>
    <script>
      (function restoreGithubPagesRoute(locationValue) {
        if (locationValue.search.slice(0, 2) !== "?/") return;
        var decoded = locationValue.search
          .slice(2)
          .split("&")
          .map(function (piece) { return piece.replace(/~and~/g, "&"); })
          .join("?");
        window.history.replaceState(
          null,
          null,
          locationValue.pathname + decoded + locationValue.hash,
        );
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
